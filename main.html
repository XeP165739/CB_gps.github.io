<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMI_CB_GPS -XeP Frame</title>
    <link rel="stylesheet" href="./main.css">
</head>
<body>

    <!-- SYSTEM TRACKING CODE SIGNATURE LABEL -->
    <div class="system-title">CMI_CB_GPS -XeP</div>

    <!-- 1:1 PICTURE BOX CONTAINER -->
    <div class="picture-box">
        <img id="nav-display" src="https://unsplash.com" alt="Navigation View">
        <div id="room-name" class="room-label">LOCATION: MAIN</div>
    </div>

    <!-- CONFIGURATION DROP-DOWNS -->
    <div class="config-form">
        <div class="dropdown-group">
            <div class="dropdown-item">
                <label for="startRoom">Start Room</label>
                <select id="startRoom"></select>
            </div>
            <div class="dropdown-item">
                <label for="targetRoom">Target Destination</label>
                <select id="targetRoom"></select>
            </div>
        </div>
        <button id="compute_route">Compute Route</button>
        <div id="path-output">Select rooms above to calculate path...</div>
    </div>

    <script type="module" src="./main/js/walk.js"></script>
    <script type="module" src="./main/js/app.js"></script>
</body>
</html>
